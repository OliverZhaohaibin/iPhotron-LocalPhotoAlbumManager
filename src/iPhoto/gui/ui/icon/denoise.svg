    </clipPath>

    <linearGradient id="trapezoidFade" x1="0%" y1="0%" x2="100%" y2="70%">
      <stop offset="30%" stop-color="#999999" stop-opacity="1"/> <stop offset="90%" stop-color="#999999" stop-opacity="0"/> </linearGradient>

    <linearGradient id="horizFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#999999" stop-opacity="0.95"/> <stop offset="100%" stop-color="#999999" stop-opacity="0"/> </linearGradient>
