<svg width="55" height="55" viewBox="0 0 55 55" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="checker_5x5" x="11" y="11" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="2.5" height="2.5" fill="#A0A0A0"/>
      <rect x="2.5" y="2.5" width="2.5" height="2.5" fill="#A0A0A0"/>
      <rect x="2.5" y="0" width="2.5" height="2.5" fill="#111111"/>
      <rect x="0" y="2.5" width="2.5" height="2.5" fill="#111111"/>
    </pattern>

    <clipPath id="innerClip">
