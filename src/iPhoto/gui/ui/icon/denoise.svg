<svg xmlns="http://www.w3.org/2000/svg"
     width="55" height="55"
     viewBox="0 0 55 55"
     fill="none">
  <!-- Rounded square frame -->
  <rect x="8" y="8" width="39" height="39" rx="6"
        stroke="white" stroke-width="3" fill="none"/>
  <!-- Noise dots (left side — noisy) -->
  <circle cx="16" cy="18" r="1.5" fill="white"/>
  <circle cx="21" cy="15" r="1.2" fill="white"/>
  <circle cx="18" cy="23" r="1.3" fill="white"/>
  <circle cx="14" cy="28" r="1.1" fill="white"/>
  <circle cx="22" cy="26" r="1.4" fill="white"/>
  <circle cx="16" cy="33" r="1.2" fill="white"/>
  <circle cx="20" cy="37" r="1.0" fill="white"/>
  <circle cx="24" cy="20" r="1.0" fill="white"/>
  <circle cx="13" cy="38" r="1.3" fill="white"/>
  <circle cx="24" cy="32" r="1.1" fill="white"/>
  <!-- Diagonal divider -->
  <line x1="26" y1="10" x2="26" y2="45"
        stroke="white" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Smooth side (right) — clean area with gentle curve -->
  <path d="M 32 20 Q 36 27.5 32 35"
        stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 37 17 Q 42 27.5 37 38"
        stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>